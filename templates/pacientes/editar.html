{% extends 'base.html' %}

{% block content %}

<h2>Editar Paciente</h2>

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label>Nome</label>
        <input name="nome" value="{{ paciente.nome }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input name="email" value="{{ paciente.email }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Telefone</label>
        <input name="telefone" value="{{ paciente.telefone }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Data de nascimento</label>
        <input type="date" name="data_nascimento" value="{{ paciente.data_nascimento|date:'Y-m-d' }}" class="form-control">
    </div>

    <button class="btn btn-primary">Salvar</button>

</form>

{% endblock %}
