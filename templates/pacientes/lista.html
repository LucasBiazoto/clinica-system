{% extends 'base.html' %}

{% block content %}

<h2>Pacientes</h2>

<a href="/pacientes/novo/" class="btn btn-success mb-3">+ Novo Paciente</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody>
        {% for p in pacientes %}
        <tr>
            <td>{{ p.nome }}</td>
            <td>{{ p.email }}</td>
            <td>{{ p.telefone }}</td>
            <td>
                <a href="/pacientes/editar/{{ p.id }}/" class="btn btn-sm btn-primary">Editar</a>
                <a href="/pacientes/deletar/{{ p.id }}/" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
