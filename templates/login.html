<!DOCTYPE html>
<html>

<head>
    <title>Login - Sistema da Clínica</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
        }

        .login-box{
            width:350px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:6px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#3498db;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="login-box">

<h2>Sistema da Clínica</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Usuário">

<input type="password" name="password" placeholder="Senha">

<button type="submit">Entrar</button>

</form>

{% if erro %}

<p style="color:red">{{ erro }}</p>

{% endif %}

</div>

</body>

</html>
