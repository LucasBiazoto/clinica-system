<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .number {
            font-size: 28px;
            font-weight: bold;
        }

        .label {
            color: gray;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>📊 Dashboard</h1>

<div class="grid">

    <div class="card">
        <div class="number">{{ total }}</div>
        <div class="label">Mensagens</div>
    </div>

    <div class="card">
        <div class="number">{{ leads }}</div>
        <div class="label">Leads</div>
    </div>

    <div class="card">
        <div class="number">{{ atendidos }}</div>
        <div class="label">Atendidos</div>
    </div>

    <div class="card">
        <div class="number">{{ conversao }}%</div>
        <div class="label">Conversão</div>
    </div>

</div>

<canvas id="grafico" width="400" height="150"></canvas>

<script>
    const ctx = document.getElementById('grafico');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Leads', 'Atendidos'],
            datasets: [{
                label: 'Performance',
                data: {{ dados }},
            }]
        }
    });
</script>

</body>
</html>
