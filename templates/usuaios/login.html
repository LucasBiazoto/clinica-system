<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema da Clínica</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #fff;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #2b2b2b;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #4fc3f7;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4fc3f7;
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #29b6f6;
        }

        .erro {
            background: #ff5252;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <h2>🔐 Login</h2>

        {% if erro %}
            <div class="erro">
                {{ erro }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Usuário</label>
            <input type="text" name="username" required>

            <label>Senha</label>
            <input type="password" name="password" required>

            <button type="submit">Entrar</button>
        </form>

        <div class="footer">
            Sistema da Clínica 🚀
        </div>

    </div>
</div>

</body>
</html>
