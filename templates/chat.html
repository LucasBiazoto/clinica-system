<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8e9ee;
            margin: 0;
        }

        .header {
            background: #d63384;
            color: #fff;
            padding: 15px;
            font-size: 18px;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .chat-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .msg {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .cliente {
            background: #eee;
            text-align: left;
        }

        .bot {
            background: #d4edda;
            margin-left: auto;
            text-align: right;
        }

        .form {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #d63384;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .voltar {
            display: inline-block;
            margin-bottom: 10px;
            text-decoration: none;
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        💬 Atendimento - {{ paciente.telefone }}
    </div>

    <div class="container">

        <a href="/painel/" class="voltar">⬅ Voltar</a>

        <div class="chat-box">
            {% for msg in mensagens %}
                
                <div class="msg cliente">
                    {{ msg.mensagem }}
                </div>

                {% if msg.resposta %}
                    <div class="msg bot">
                        {{ msg.resposta }}
                    </div>
                {% endif %}

            {% endfor %}
        </div>

        <!-- 🔥 FORM CORRIGIDO -->
        <form method="POST" action="/responder/{{ paciente.id }}/" class="form">
            {% csrf_token %}
            <input type="text" name="resposta" placeholder="Digite sua resposta..." required>
            <button type="submit">Enviar</button>
        </form>

    </div>

</body>
</html>
