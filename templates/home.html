<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clínica System</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            text-align: center;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.1);
        }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<header>
    <h1>🏥 Sistema da Clínica</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Admin</h2>
        <a href="/admin/">Entrar</a>
    </div>

</div>

</body>
</html>
