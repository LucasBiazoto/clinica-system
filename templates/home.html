<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        a {
            text-decoration: none;
            color: white;
            background: #3498db;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

    <header>
        <h1>🏥 Sistema da Clínica</h1>
        <p>Gerenciamento completo</p>
    </header>

    <div class="container">

        <div class="card">
            <h2>Pacientes</h2>
            <p>Cadastro e controle de pacientes</p>
            <a href="#">Acessar</a>
        </div>

        <div class="card">
            <h2>Médicos</h2>
            <p>Gestão de profissionais</p>
            <a href="#">Acessar</a>
        </div>

        <div class="card">
            <h2>Agenda</h2>
            <p>Controle de consultas</p>
            <a href="#">Acessar</a>
        </div>

        <div class="card">
            <h2>Admin</h2>
            <p>Painel administrativo Django</p>
            <a href="/admin/">Entrar</a>
        </div>

    </div>

</body>
</html>
