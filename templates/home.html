{% extends 'base.html' %}

{% block content %}

<div class="row">

    <!-- Título -->
    <div class="col-12 mb-4">
        <h2>📊 Dashboard</h2>
        <p class="text-muted">Visão geral do sistema</p>
    </div>

    <!-- Cards -->
    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <h5>Total de Pacientes</h5>
            <h2 class="text-primary">{{ total_pacientes }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <h5>Consultas (futuro)</h5>
            <h2 class="text-success">0</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow text-center p-3">
            <h5>Financeiro (futuro)</h5>
            <h2 class="text-warning">R$ 0</h2>
        </div>
    </div>

</div>

<hr>

<!-- Ações rápidas -->
<div class="row mt-4">

    <div class="col-md-4">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Pacientes</h5>
                <p class="card-text">Gerenciar pacientes</p>
                <a href="/pacientes/" class="btn btn-primary">Acessar</a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Admin</h5>
                <p class="card-text">Painel Django</p>
                <a href="/admin/" class="btn btn-warning">Entrar</a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Sair</h5>
                <p class="card-text">Encerrar sessão</p>
                <a href="/usuarios/logout/" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </div>

</div>

{% endblock %}
